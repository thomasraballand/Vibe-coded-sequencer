<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Step Sequencer</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎹</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="min-h-screen flex flex-col items-center justify-center p-4 md:p-8">
      <div class="w-full max-w-5xl hardware-panel p-6 md:p-8 flex flex-col gap-8">
        <!-- Header -->
        <div class="flex flex-col md:flex-row items-center justify-between gap-6 pb-6 border-b border-white/10">
          <div class="flex items-center gap-6 w-full md:w-auto justify-between md:justify-start">
            <button id="play-btn" class="w-14 h-14 shrink-0 rounded-full flex items-center justify-center transition-all bg-[#333] text-gray-300 hover:bg-[#444]">
              <svg id="play-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="ml-1"><polygon points="6 3 20 12 6 21 6 3"></polygon></svg>
              <svg id="stop-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="hidden"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"></rect></svg>
            </button>
            <div class="lcd-screen px-4 py-2 rounded flex flex-col items-center min-w-[100px]">
              <span class="text-[10px] text-gray-500 uppercase tracking-widest mb-1 font-mono">Tempo</span>
              <input id="bpm-input" type="number" min="60" max="200" value="120" class="text-2xl font-bold bg-transparent border-none text-center w-full outline-none text-[var(--accent)] p-0 m-0 font-mono" />
            </div>
          </div>
          <div class="flex-1 w-full max-w-xs flex flex-col gap-2">
            <div class="flex justify-between text-xs font-mono text-gray-500">
              <span>60</span><span>BPM</span><span>200</span>
            </div>
            <input id="bpm-slider" type="range" min="60" max="200" value="120" class="w-full" />
          </div>
          <button id="clear-btn" class="flex items-center justify-center gap-2 px-4 py-3 md:py-2 w-full md:w-auto rounded bg-[#333] hover:bg-[#444] text-gray-300 transition-colors text-sm font-mono uppercase tracking-wider">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>
            Clear
          </button>
        </div>
        <!-- Grid -->
        <div class="overflow-x-auto pb-4 -mx-4 px-4 md:mx-0 md:px-0">
          <div class="min-w-[768px] flex flex-col gap-2" id="grid-container">
            <!-- Generated by JS -->
          </div>
        </div>
      </div>
      <div class="mt-8 text-center max-w-md px-4">
        <p class="text-xs text-gray-500 font-mono leading-relaxed">
          Tap to toggle steps. Swipe to draw multiple steps.<br/>
          Built with Web Audio API & Vanilla JS.
        </p>
      </div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
